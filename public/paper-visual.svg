<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">流云栖木纸面视觉标记</title>
  <desc id="desc">暖纸书票上的抽象流云、栖木竖笔、小舟灯影与水纹。</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaf7" />
      <stop offset="0.52" stop-color="#f4f0e8" />
      <stop offset="1" stop-color="#ebe4d5" />
    </linearGradient>
    <linearGradient id="inkLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#1b365d" stop-opacity="0" />
      <stop offset="0.18" stop-color="#1b365d" stop-opacity="0.72" />
      <stop offset="0.7" stop-color="#1b365d" stop-opacity="0.92" />
      <stop offset="1" stop-color="#1b365d" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="paperWash" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1b365d" stop-opacity="0.09" />
      <stop offset="0.62" stop-color="#6b6a64" stop-opacity="0.08" />
      <stop offset="1" stop-color="#98553f" stop-opacity="0.04" />
    </linearGradient>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#c48a68" stop-opacity="0.32" />
      <stop offset="0.55" stop-color="#98553f" stop-opacity="0.08" />
      <stop offset="1" stop-color="#98553f" stop-opacity="0" />
    </radialGradient>
    <filter id="paperGrain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence baseFrequency="0.82" numOctaves="2" seed="23" type="fractalNoise" result="noise" />
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.95 0 0 0 0 0.91 0 0 0 0 0.82 0 0 0 .16 0" result="grain" />
      <feBlend in="SourceGraphic" in2="grain" mode="multiply" />
    </filter>
    <filter id="softWash" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="20" />
    </filter>
  </defs>

  <rect width="1200" height="1500" fill="#f5f4ed" />
  <g opacity="0.32">
    <path d="M132 184h936M132 432h936M132 680h936M132 928h936M132 1176h936" stroke="#e4ded0" stroke-width="2" />
