<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">流云栖木纸面视觉标记</title>
  <desc id="desc">暖纸上由流云、栖木、小舟、灯影和水纹组成的留白视觉。</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaf6" />
      <stop offset="0.54" stop-color="#f5f1e8" />
      <stop offset="1" stop-color="#eee9dc" />
    </linearGradient>
    <linearGradient id="inkFade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#1b365d" stop-opacity="0.16" />
      <stop offset="0.48" stop-color="#1b365d" stop-opacity="0.78" />
      <stop offset="1" stop-color="#1b365d" stop-opacity="0.2" />
    </linearGradient>
    <filter id="paperGrain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence baseFrequency="0.9" numOctaves="2" seed="7" type="fractalNoise" result="noise" />
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.94 0 0 0 0 0.9 0 0 0 0 0.82 0 0 0 .14 0" result="grain" />
      <feBlend in="SourceGraphic" in2="grain" mode="multiply" />
    </filter>
    <filter id="softInk" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.16" />
    </filter>
  </defs>

  <rect width="1200" height="1500" fill="#f5f4ed" />
  <g opacity="0.48">
